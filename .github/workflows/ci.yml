name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check time_budget tests build.py

      - name: Check formatting
        run: ruff format --check time_budget tests build.py

      - name: Run tests
        run: pytest -v

      - name: Build add-on package
        run: python build.py

      - name: Upload .ankiaddon artifact
        uses: actions/upload-artifact@v4
        with:
          name: time_budget.ankiaddon
          path: time_budget.ankiaddon
